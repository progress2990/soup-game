<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soup Game</title>
    <style>

        html {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color:rgb(255, 255, 235);
            color:rgb(61, 61, 61);
            padding:2px;
            margin:1%;
        }
        body {
            border: pink solid 2px;
            background-color:pink;
            border-radius:100px;
        }
        button {
            color:rgb(59, 59, 59);
            background-color:rgb(255, 165, 180);
            border: none;
            border-radius:200px;
            height:50px;
            width:100px;
        }
        button:hover {
            background-color:rgb(255, 142, 161);
            color:black;
        }
        button:active {
            color:white;
        }
        @media screen and (min-width: 768px) {
            html {
                font-size: 125%;
            }
        }
@media screen and (min-width: 992px) {
  html {
    margin-left:25%;
    margin-right:25%;
    
  }
}

    </style>
    <script>
        // make an array with the list of fruits and vegetables we have and make it so that each time a new customer comes in, three random items are selected from the array.
        function order(){
        const items = ["apple", "banana", "carrot", "broccoli", "orange", "grape", "lettuce", "apple"];
        const three_food = items.sort(() => 0.5 - Math.random()).slice(0, 3);
        alert(three_food);
    }
    </script>
</head>
<body>
    <div>
        <h1>Welcome to the soup game!</h1>
        <div>
            <button onclick="order()">Play</button>
            <button>Settings</button>
        </div>
    </div>
</body>
</html>
